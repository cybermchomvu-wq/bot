{% extends 'base.html' %}

{% block title %}Create Article - Football News{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="card-title mb-4" style="color: #1e3a8a;">
                        <i class="fas fa-plus"></i> Create New Article
                    </h2>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="title" class="form-label">Article Title *</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>

                        <div class="mb-3">
                            <label for="category_id" class="form-label">Category *</label>
                            <select class="form-select" id="category_id" name="category_id" required>
                                <option value="">Select a category</option>
                                {% for cat in categories %}
                                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="excerpt" class="form-label">Excerpt (Short summary)</label>
                            <input type="text" class="form-control" id="excerpt" name="excerpt" placeholder="Brief summary for preview">
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label">Article Content *</label>
                            <textarea class="form-control" id="content" name="content" rows="10" placeholder="Write your article here..." required></textarea>
                            <small class="form-text text-muted">You can use HTML tags for formatting.</small>
                        </div>

                        <div class="mb-3">
                            <label for="image_url" class="form-label">Featured Image URL</label>
                            <input type="url" class="form-control" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
                        </div>

                        <div class="mb-3">
                            <label for="video_url" class="form-label">Video/Highlights URL (YouTube embed)</label>
                            <input type="url" class="form-control" id="video_url" name="video_url" placeholder="https://www.youtube.com/embed/...">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Publish Article
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
